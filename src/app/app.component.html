<div id="page-container" [class.arcade-mode]="!isEditorialPage" [class.home-mode]="isEditorialPage">
  <a class="skip-link" href="#content-wrap">Saltar al contenido</a>
  <header class="site-header">
    <div class="header-strip"><span>★ AEL'S SECRET CORNER ★</span><span class="best-viewed">BEST VIEWED WITH CURIOSITY</span></div>
    <div class="masthead">
      <a class="brand" routerLink="/"><span>Ael's</span><strong>Secret Corner</strong><small>developer • educator • digital explorer</small></a>
      <div class="header-orb" aria-hidden="true"><img src="banner.gif" alt=""></div>
      <div class="site-clock"><b>STATUS</b><span>● ONLINE</span><small>Chile / WWW</small></div>
    </div>
    <button class="menu-button" type="button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">☰ SITE MENU</button>
    <nav class="site-nav" [class.open]="isMenuOpen" aria-label="Navegación principal">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">⌂ HOME</a>
      <a routerLink="/about" routerLinkActive="active">☺ ABOUT ME</a>
      <a routerLink="/gato" routerLinkActive="active">♡ TRES EN RAYA</a>
      <a routerLink="/batalla-naval" routerLinkActive="active">⚓ NAVAL</a>
      <a routerLink="/memorice" routerLinkActive="active">✦ MEMORICE</a>
      <a routerLink="/palabras" routerLinkActive="active">❀ PALABRAS</a>
      <a routerLink="/snake" routerLinkActive="active">◆ SNAKE</a>
      <a routerLink="/lector" routerLinkActive="active">♫ VOZ</a>
      <a routerLink="/cipher" routerLinkActive="active">⌨ CIPHER</a>
      <a routerLink="/ctf" routerLinkActive="active">⚑ CTF</a>
    </nav>
  </header>

  <main id="content-wrap"><router-outlet></router-outlet></main>

  <aside class="cursor-palette" aria-label="Selector de cursor">
    <span>CURSOR</span>
    <button (click)="setCursor('system')" [class.selected]="cursorChoice==='system'" title="Cursor del sistema">↖</button>
    <button (click)="setCursor('cursor1')" [class.selected]="cursorChoice==='cursor1'" title="Gatito"><img src="cursor.gif" alt="Gatito"></button>
    <button (click)="setCursor('cursor2')" [class.selected]="cursorChoice==='cursor2'" title="Ordenador"><img src="cursor2.gif" alt="Ordenador"></button>
    <button (click)="setCursor('cursor3')" [class.selected]="cursorChoice==='cursor3'" title="Cursor 3"><img src="cursor3.gif" alt="Cursor 3"></button>
    <button (click)="setCursor('cursor4')" [class.selected]="cursorChoice==='cursor4'" title="Cursor 4"><img src="cursor4.gif" alt="Cursor 4"></button>
    <button (click)="setCursor('wand')" [class.selected]="cursorChoice==='wand'" title="Varita">✧</button>
  </aside>

  <div class="custom-gif-cursor"
       *ngIf="activeGifCursor"
       [style.display]="isCursorVisible ? 'block' : 'none'"
       [style.transform]="'translate3d(' + cursorX + 'px, ' + cursorY + 'px, 0)'"
       aria-hidden="true">
    <img [src]="activeGifCursor" alt="" />
  </div>

</div>
